name: Build and Publish Release
on:
    workflow_call:
        inputs:
            nodeVersion:
                description: "The NodeJS Version that should be used in this workflow."
                default: '20.x'
                type: string
env:
    NODE_VERSION: ${{ inputs.nodeVersion }}
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            -   name: Generate github app token
                id: generate_token
                uses: actions/create-github-app-token@v1
                with:
                    app-id: ${{ secrets.APP_ID }}
                    private-key: ${{ secrets.APP_PRIVATE_KEY }}
            -   uses: actions/checkout@v4
                with:
                    token: ${{ steps.generate_token.outputs.token }}
            -   name: Set up Node.js ${{ env.NODE_VERSION }}
                uses: actions/setup-node@v4
                with:
                    node-version: ${{ env.NODE_VERSION }}
            -   name: Install
                run: npm install -g pnpm lerna@9.0.3 && pnpm install
            -   name: Build
                run: pnpm build
            -   name: Test
                run: pnpm test
            -   name: "Retain build artifact: api"
                uses: actions/upload-artifact@v4
                with:
                    name: nl-portal-api
                    path: packages/api/dist/
                    retention-days: 1
            -   name: "Retain build artifact: authentication"
                uses: actions/upload-artifact@v4
                with:
                    name: nl-portal-authentication
                    path: packages/authentication/dist/
                    retention-days: 1
            -   name: "Retain build artifact: localization"
                uses: actions/upload-artifact@v4
                with:
                    name: nl-portal-localization
                    path: packages/localization/dist/
                    retention-days: 1
            -   name: "Retain build artifact: user interface"
                uses: actions/upload-artifact@v4
                with:
                    name: nl-portal-user-interface
                    path: packages/user-interface/dist/
                    retention-days: 1
    publish-npm:
        runs-on: ubuntu-latest
        needs: build
        outputs:
            version: ${{ steps.read-version.outputs.VERSION }}
        steps:
            -   name: Generate github app token
                id: generate_token
                uses: actions/create-github-app-token@v1
                with:
                    app-id: ${{ secrets.APP_ID }}
                    private-key: ${{ secrets.APP_PRIVATE_KEY }}
            -   uses: actions/checkout@v4
                with:
                    token: ${{ steps.generate_token.outputs.token }}
            -   name: Set up Node.js ${{ env.NODE_VERSION }}
                uses: actions/setup-node@v4
                with:
                    node-version: ${{ env.NODE_VERSION }}
            -   name: Install
                run: |
                    npm install -g pnpm
                    npm install -g lerna@9.0.3
            -   name: "Restore build artifact: api"
                uses: actions/download-artifact@v4
                with:
                    name: nl-portal-api
                    path: packages/api/dist/
            -   name: "Restore build artifact: authentication"
                uses: actions/download-artifact@v4
                with:
                    name: nl-portal-authentication
                    path: packages/authentication/dist/
            -   name: "Restore build artifact: localization"
                uses: actions/download-artifact@v4
                with:
                    name: nl-portal-localization
                    path: packages/localization/dist/
            -   name: "Restore build artifact: user interface"
                uses: actions/download-artifact@v4
                with:
                    name: nl-portal-user-interface
                    path: packages/user-interface/dist/
            -   name: lerna version
                env:
                    GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
                    GIT_AUTHOR_EMAIL: ${{ secrets.GIT_AUTHOR_EMAIL }}
                    GIT_AUTHOR_NAME: "nl-portal"
                    GIT_COMMITTER_EMAIL: ${{ secrets.GIT_COMMITTER_EMAIL }}
                    GIT_COMMITTER_NAME: "nl-portal"
                run: |
                    git push --set-upstream origin HEAD
                    pnpm run release --yes
            -   name: Read bumped version
                id: read-version
                run: echo "VERSION=$(node -p "require('./packages/api/package.json').version")" >> $GITHUB_OUTPUT
            -   name: lerna publish
                env:
                    NPM_ACCESS_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
                run: |
                    npm config set "//registry.npmjs.org/:_authToken" "${NPM_ACCESS_TOKEN}"
                    npm config set access public
                    npm run publish -- --yes
                    npm config delete "//registry.npmjs.org/:_authToken"
    publish-sbom:
        runs-on: ubuntu-latest
        needs: publish-npm
        env:
            ARTIFACT_VERSION: ${{ needs.publish-npm.outputs.version }}
        permissions:
            contents: write
        steps:
            -   uses: actions/checkout@v4
            -   name: Set up Node.js ${{ env.NODE_VERSION }}
                uses: actions/setup-node@v4
                with:
                    node-version: ${{ env.NODE_VERSION }}
            -   name: Install pnpm
                run: npm install -g pnpm
            -   name: Install dependencies
                run: pnpm install
            -   name: Generate SBOM
                uses: anchore/sbom-action@v0
                with:
                    path: .
                    output-file: frontend.cdx.json
                    artifact-name: frontend-${{ env.ARTIFACT_VERSION }}.cdx.json
                    format: cyclonedx-json
                    upload-artifact: true
                    upload-artifact-retention: 90
                    upload-release-assets: false
                    dependency-snapshot: true
                    github-token: ${{ secrets.GITHUB_TOKEN }}
            -   name: Push SBOM to S3
                env:
                    AWS_ACCESS_KEY_ID: ${{ secrets.AWS_KEY_ID }}
                    AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                    AWS_DEFAULT_REGION: 'eu-central-1'
                run: |
                    aws s3 cp frontend.cdx.json s3://nl-portal-dependency-reports/sbom/${{ env.ARTIFACT_VERSION }}/frontend.cdx.json
                    aws s3 rm s3://nl-portal-dependency-reports/sbom/latest/frontend.cdx.json || true
                    aws s3 cp frontend.cdx.json s3://nl-portal-dependency-reports/sbom/latest/frontend.cdx.json
            -   name: Log link to bucket
                run: echo "::notice::Uploaded SBOM to - https://nl-portal-dependency-reports.s3.eu-central-1.amazonaws.com/index.html?prefix=sbom/${{ env.ARTIFACT_VERSION }}/"
