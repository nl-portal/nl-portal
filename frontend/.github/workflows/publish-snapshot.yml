name: Build and Publish Snapshot
on:
    workflow_call:
        inputs:
            nodeVersion:
                description: "The NodeJS Version that should be used in this workflow."
                default: '20.x'
                type: string
            targets:
                description: "The target repositories to publish to. See default for options and input format."
                default: "['github-npm','s3-snapshots']"
                type: string

env:
    NODE_VERSION: ${{ inputs.nodeVersion }}
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            -   name: Generate github app token
                id: generate_token
                uses: actions/create-github-app-token@v1
                with:
                    app-id: ${{ secrets.APP_ID }}
                    private-key: ${{ secrets.APP_PRIVATE_KEY }}
            -   uses: actions/checkout@v4
                with:
                    token: ${{ steps.generate_token.outputs.token }}
            -   name: Set up Node.js ${{ env.NODE_VERSION }}
                uses: actions/setup-node@v4
                with:
                    node-version: ${{ env.NODE_VERSION }}
            -   name: Install
                run: npm install -g pnpm lerna@7.4.2 && pnpm install
            -   name: Build
                run: pnpm build
            -   name: Test
                run: pnpm test
            -   name: "Retain build artifact: api"
                uses: actions/upload-artifact@v4
                with:
                    name: nl-portal-api
                    path: packages/api/dist/
                    retention-days: 1
            -   name: "Retain build artifact: authentication"
                uses: actions/upload-artifact@v4
                with:
                    name: nl-portal-authentication
                    path: packages/authentication/dist/
                    retention-days: 1
            -   name: "Retain build artifact: localization"
                uses: actions/upload-artifact@v4
                with:
                    name: nl-portal-localization
                    path: packages/localization/dist/
                    retention-days: 1
            -   name: "Retain build artifact: user interface"
                uses: actions/upload-artifact@v4
                with:
                    name: nl-portal-user-interface
                    path: packages/user-interface/dist/
                    retention-days: 1
    detect-variables:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.generate-snapshot-version.outputs.VERSION }}
        steps:
            -   name: Checkout
                uses: actions/checkout@v4
            -   name: Get version from project
                id: get-project-version
                run: echo "PROJECT_VERSION=$(grep -P  "lerna version" package.json | grep -Po '\d+\.\d+\.\d+')" >> $GITHUB_OUTPUT
            -   name: Generate snapshot version
                id: generate-snapshot-version
                run: |
                    branch=${GITHUB_REF##*/}
                    sha=${GITHUB_SHA::8}
                    ts=$(date +'%Y%m%d%H%M')
                    echo "VERSION=${{ steps.get-project-version.outputs.PROJECT_VERSION }}-${{ startsWith(github.ref_name, 'rc/') && 'RC' || '${branch}' }}-${ts}-${sha}-SNAPSHOT" >> "$GITHUB_OUTPUT"
            -   name: Log version
                run: echo "::notice::Using version - \"${{ steps.generate-snapshot-version.outputs.VERSION }}\"."
    up-version:
        runs-on: ubuntu-latest
        needs:
            - build
            - detect-variables
        env:
            ARTIFACT_VERSION: ${{ needs.detect-variables.outputs.version }}
        steps:
            -   name: Generate github app token
                id: generate_token
                uses: actions/create-github-app-token@v1
                with:
                    app-id: ${{ secrets.APP_ID }}
                    private-key: ${{ secrets.APP_PRIVATE_KEY }}
            -   uses: actions/checkout@v4
                with:
                    token: ${{ steps.generate_token.outputs.token }}
            -   name: Set up Node.js ${{ env.NODE_VERSION }}
                uses: actions/setup-node@v4
                with:
                    node-version: ${{ env.NODE_VERSION }}
            -   name: Install
                run: |
                    npm install -g pnpm lerna@7.4.2
            -   name: lerna version
                env:
                    GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
                    GIT_AUTHOR_EMAIL: ${{ secrets.GIT_AUTHOR_EMAIL }}
                    GIT_AUTHOR_NAME: "nl-portal"
                    GIT_COMMITTER_EMAIL: ${{ secrets.GIT_COMMITTER_EMAIL }}
                    GIT_COMMITTER_NAME: "nl-portal"
                run: |
                    git push --set-upstream origin HEAD
                    lerna version ${{ env.ARTIFACT_VERSION }} --no-changelog --no-private --no-commit-hooks --message 'chore: incremented package versions to %s [skip ci]' --yes
    publish-github:
        runs-on: ubuntu-latest
        needs:
            - build
            - detect-variables
            - up-version
        if: ${{ contains(fromJSON(inputs.targets),'github-npm')}}
        permissions:
            packages: write
        steps:
            -   uses: actions/checkout@v4
            -   name: Set up Node.js ${{ env.NODE_VERSION }}
                uses: actions/setup-node@v4
                with:
                    registry-url: 'https://npm.pkg.github.com'
                    node-version: ${{ env.NODE_VERSION }}
            -   name: Install
                run: |
                    npm install -g pnpm lerna@7.4.2
            -   name: "Restore build artifact: api"
                uses: actions/download-artifact@v4
                with:
                    name: nl-portal-api
                    path: packages/api/dist/
            -   name: "Restore build artifact: authentication"
                uses: actions/download-artifact@v4
                with:
                    name: nl-portal-authentication
                    path: packages/authentication/dist/
            -   name: "Restore build artifact: localization"
                uses: actions/download-artifact@v4
                with:
                    name: nl-portal-localization
                    path: packages/localization/dist/
            -   name: "Restore build artifact: user interface"
                uses: actions/download-artifact@v4
                with:
                    name: nl-portal-user-interface
                    path: packages/user-interface/dist/
            -   name: lerna publish
                env:
                    NPM_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                run: |
                    npm config set "//npm.pkg.github.com/:_authToken" "${NPM_ACCESS_TOKEN}"
                    npm config set access public
                    npm run publish -- --no-verify-access --yes
                    npm config delete "//npm.pkg.github.com/:_authToken"
    publish-s3:
        runs-on: ubuntu-latest
        needs:
            - build
            - detect-variables
            - up-version
        if: ${{ contains(fromJSON(inputs.targets),'s3-snapshots')}}
        env:
            BUCKET_NAME: ${{ vars.AWS_SNAPSHOTS_BUCKET }}
            ARTIFACT_VERSION: ${{ needs.detect-variables.outputs.version }}
        permissions:
            contents: read
        steps:
            -   uses: actions/checkout@v4
            -   name: Set up Node.js ${{ env.NODE_VERSION }}
                uses: actions/setup-node@v4
                with:
                    node-version: ${{ env.NODE_VERSION }}
            -   name: Install
                run: |
                    npm install -g pnpm lerna@7.4.2 && pnpm install
            -   name: "Restore build artifact: api"
                uses: actions/download-artifact@v4
                with:
                    name: nl-portal-api
                    path: packages/api/dist/
            -   name: "Restore build artifact: authentication"
                uses: actions/download-artifact@v4
                with:
                    name: nl-portal-authentication
                    path: packages/authentication/dist/
            -   name: "Restore build artifact: localization"
                uses: actions/download-artifact@v4
                with:
                    name: nl-portal-localization
                    path: packages/localization/dist/
            -   name: "Restore build artifact: user interface"
                uses: actions/download-artifact@v4
                with:
                    name: nl-portal-user-interface
                    path: packages/user-interface/dist/
            -   name: package artifacts
                run: pnpm -r --filter=\!./packages/app --out=%s.tgz pack
            -   name: push artifacts to s3
                env:
                    AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
                    AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                    AWS_DEFAULT_REGION: 'eu-central-1'
                run: aws s3 cp --recursive --exclude "*" --include "*.tgz" . s3://${{ env.BUCKET_NAME }}/${{ env.ARTIFACT_VERSION }}/
            -   name: Log link to bucket
                run: echo "::notice::Uploaded artifacts to - https://${{ env.BUCKET_NAME }}.s3.eu-central-1.amazonaws.com/?prefix=${{ env.ARTIFACT_VERSION }}/"
