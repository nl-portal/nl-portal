overwrite: true
noSilentErrors: true
schema: "http://localhost:8090/graphql"
documents: "./src/{fragments,mutations,queries}/**/*.{ts,tsx}"
generates:
  src/generated/Graphql.tsx:
    plugins:
      - "typescript"
      - "typescript-operations"
      - "typescript-react-apollo"
    config:
      withHooks: true
