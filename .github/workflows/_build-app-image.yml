name: _build-app-image

on:
    workflow_call:
        inputs:
            stack:
                description: "backend | frontend"
                type: string
                required: true
            tags:
                description: "Newline-separated fully-qualified image tags to build/push."
                type: string
                required: true
            primaryTag:
                description: "One tag used for the post-push cosign verify."
                type: string
                required: true
            push:
                type: boolean
                default: false
            platforms:
                type: string
                default: "linux/amd64,linux/arm64"

permissions:
    contents: read
    packages: write
    id-token: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            -   name: Download stage bundle
                uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
                with:
                    name: ${{ inputs.stack }}-stage
                    path: ${{ inputs.stack }}
            -   name: Restore stage bundle
                working-directory: ${{ inputs.stack }}
                env:
                    STACK: ${{ inputs.stack }}
                run: tar -xf "${STACK}-stage.tar" && rm "${STACK}-stage.tar"

            -   name: Install Cosign
                if: ${{ inputs.push }}
                uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
            -   name: Set up QEMU
                uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

            -   name: Login to GitHub Container Registry
                if: ${{ inputs.push }}
                uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Build and push image
                id: build-and-push
                uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
                with:
                    context: ${{ inputs.stack }}
                    file: ${{ inputs.stack }}/Dockerfile
                    build-args: BUILD_MODE=ci
                    platforms: ${{ inputs.platforms }}
                    push: ${{ inputs.push }}
                    provenance: false
                    tags: ${{ inputs.tags }}

            -   name: Sign the image with the GitHub OIDC token
                if: ${{ inputs.push }}
                env:
                    DIGEST: ${{ steps.build-and-push.outputs.digest }}
                    TAGS: ${{ inputs.tags }}
                run: |
                    while IFS= read -r tag; do
                      [ -z "${tag}" ] && continue
                      cosign sign --yes "${tag}@${DIGEST}"
                    done <<< "${TAGS}"

            -   name: Verify the signed image
                if: ${{ inputs.push }}
                env:
                    PRIMARY_TAG: ${{ inputs.primaryTag }}
                run: |
                    cosign verify "${PRIMARY_TAG}" \
                       --certificate-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/_build-app-image.yml@${GITHUB_REF}" \
                       --certificate-oidc-issuer https://token.actions.githubusercontent.com
