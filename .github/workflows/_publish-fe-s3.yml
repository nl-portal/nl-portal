name: _publish-fe-s3

on:
    workflow_call:
        inputs:
            version:
                type: string
                required: true
            nodeVersion:
                type: string
                default: "24"

permissions:
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        env:
            BUCKET: ${{ secrets.AWS_NPM_SNAPSHOTS_BUCKET }}
        steps:
            -   uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            -   name: Set up Node.js ${{ inputs.nodeVersion }}
                uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
                with:
                    node-version: ${{ inputs.nodeVersion }}
            -   name: Install
                working-directory: frontend
                run: npm install -g pnpm@11 && pnpm install
            -   name: Download stage bundle
                uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
                with:
                    name: frontend-stage
                    path: frontend
            -   name: Restore stage bundle
                working-directory: frontend
                run: tar -xf frontend-stage.tar && rm frontend-stage.tar
            -   name: Pack library tarballs
                working-directory: frontend
                run: pnpm -r --filter=!./packages/app --out=%s.tgz pack
            -   name: Push tarballs to S3
                working-directory: frontend
                env:
                    AWS_ACCESS_KEY_ID: ${{ secrets.AWS_FRONTEND_ACCESS_KEY_ID }}
                    AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_FRONTEND_SECRET_ACCESS_KEY }}
                    AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
                    VERSION: ${{ inputs.version }}
                run: aws s3 cp --recursive --exclude "*" --include "*.tgz" . "s3://${BUCKET}/${VERSION}/"
            -   name: Log location
                env:
                    VERSION: ${{ inputs.version }}
                    REGION: ${{ secrets.AWS_REGION }}
                run: echo "::notice::Frontend ${VERSION} tarballs at https://${BUCKET}.s3.${REGION}.amazonaws.com/index.html?prefix=${VERSION}/"
