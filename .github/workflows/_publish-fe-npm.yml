name: _publish-fe-npm

on:
    workflow_call:
        inputs:
            version:
                description: "The exact version to publish (rc: X.Y.Z-RC-N-SNAPSHOT, release: X.Y.Z)."
                type: string
                required: true
            distTag:
                description: "npm dist-tag: rc | latest | v<major>"
                type: string
                required: true
            nodeVersion:
                type: string
                default: "24"

permissions:
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            -   name: Set up Node.js ${{ inputs.nodeVersion }}
                uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
                with:
                    node-version: ${{ inputs.nodeVersion }}
                    registry-url: 'https://registry.npmjs.org'
            -   name: Install
                working-directory: frontend
                run: npm install -g pnpm@11 lerna@9 && pnpm install
            -   name: Download stage bundle
                uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
                with:
                    name: frontend-stage
                    path: frontend
            -   name: Restore stage bundle
                working-directory: frontend
                run: tar -xf frontend-stage.tar && rm frontend-stage.tar
            -   name: Publish to npmjs
                working-directory: frontend
                env:
                    NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
                    DIST_TAG: ${{ inputs.distTag }}
                    VERSION: ${{ inputs.version }}
                run: |
                    npm config set "//registry.npmjs.org/:_authToken" "${NODE_AUTH_TOKEN}"
                    npm config set access public
                    missing=0
                    for pkg in api authentication localization user-interface; do
                      name=$(node -p "require('./packages/${pkg}/package.json').name")
                      if npm view "${name}@${VERSION}" version > /dev/null 2>&1; then
                        echo "::notice::${name}@${VERSION} already on npm - skipping."
                      else
                        missing=1
                      fi
                    done
                    if [ "${missing}" -eq 0 ]; then
                      echo "::notice::All packages already published at ${VERSION}; nothing to do."
                    else
                      lerna publish from-package --dist-tag "${DIST_TAG}" --no-verify-access --yes
                    fi
                    npm config delete "//registry.npmjs.org/:_authToken"
