name: Build and Publish Snapshot

on:
    push:
        branches:
            - main
            - "hotfix/*"
    workflow_dispatch:

concurrency:
    group: snapshot-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: read
    packages: write
    id-token: write

jobs:
    prepare:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.v.outputs.version }}
        steps:
            -   uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            -   name: Compute snapshot version
                id: v
                run: |
                    base=$(cat version.txt)
                    branch="${GITHUB_REF_NAME//[^a-zA-Z0-9]/-}"
                    sha="${GITHUB_SHA::8}"
                    ts=$(date +%s)
                    version="${base}-${branch}-${ts}-${sha}-SNAPSHOT"
                    echo "version=${version}" >> "$GITHUB_OUTPUT"
                    echo "::notice::Snapshot version ${version}"

    stage-be:
        needs: prepare
        uses: ./.github/workflows/_stage-be.yml
        with:
            version: ${{ needs.prepare.outputs.version }}

    stage-fe:
        needs: prepare
        uses: ./.github/workflows/_stage-fe.yml
        with:
            version: ${{ needs.prepare.outputs.version }}

    image-be:
        needs: [prepare, stage-be]
        uses: ./.github/workflows/_build-app-image.yml
        with:
            stack: backend
            push: true
            primaryTag: ghcr.io/nl-portal/nl-portal-backend:${{ needs.prepare.outputs.version }}
            tags: |
                ghcr.io/nl-portal/nl-portal-backend:${{ needs.prepare.outputs.version }}
        secrets: inherit

    image-fe:
        needs: [prepare, stage-fe]
        uses: ./.github/workflows/_build-app-image.yml
        with:
            stack: frontend
            push: true
            primaryTag: ghcr.io/nl-portal/nl-portal-frontend:${{ needs.prepare.outputs.version }}
            tags: |
                ghcr.io/nl-portal/nl-portal-frontend:${{ needs.prepare.outputs.version }}
        secrets: inherit

    publish-be-s3:
        needs: [prepare, stage-be]
        uses: ./.github/workflows/_publish-be-s3.yml
        with:
            version: ${{ needs.prepare.outputs.version }}
        secrets: inherit

    publish-fe-s3:
        needs: [prepare, stage-fe]
        uses: ./.github/workflows/_publish-fe-s3.yml
        with:
            version: ${{ needs.prepare.outputs.version }}
        secrets: inherit
