name: _validate-build

on:
    workflow_call:
        inputs:
            javaVersion:
                type: string
                default: "21"
            nodeVersion:
                type: string
                default: "24"
            runBackend:
                description: "Build+test the backend stack."
                type: boolean
                default: true
            runFrontend:
                description: "Build+test the frontend stack."
                type: boolean
                default: true

permissions:
    contents: read

jobs:
    build-be:
        if: ${{ inputs.runBackend }}
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            -   name: Set up JDK ${{ inputs.javaVersion }}
                uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
                with:
                    java-version: ${{ inputs.javaVersion }}
                    distribution: temurin
            -   name: Set up Gradle
                uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
            -   name: Build with Gradle
                working-directory: backend
                run: ./gradlew build

    build-fe:
        if: ${{ inputs.runFrontend }}
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            -   name: Set up Node.js ${{ inputs.nodeVersion }}
                uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
                with:
                    node-version: ${{ inputs.nodeVersion }}
            -   name: Install
                working-directory: frontend
                run: npm install -g pnpm@11 && pnpm install
            -   name: Build
                working-directory: frontend
                run: pnpm -r build
            -   name: Test
                working-directory: frontend
                run: pnpm test
