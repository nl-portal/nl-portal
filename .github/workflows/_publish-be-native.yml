name: _publish-be-native

on:
    workflow_call:
        inputs:
            version:
                type: string
                required: true
            deployer:
                description: "sonatype-snapshots (RC) | sonatype (release / Maven Central)"
                type: string
                required: true
            probeCentral:
                type: boolean
                default: false
            uploadReports:
                type: boolean
                default: false
            javaVersion:
                type: string
                default: "21"

permissions:
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            -   name: Set up JDK ${{ inputs.javaVersion }}
                uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
                with:
                    java-version: ${{ inputs.javaVersion }}
                    distribution: temurin
            -   name: Download stage bundle
                uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
                with:
                    name: backend-stage
                    path: backend
            -   name: Restore stage bundle
                working-directory: backend
                run: tar -xf backend-stage.tar && rm backend-stage.tar
            -   name: Probe Maven Central
                id: probe
                if: ${{ inputs.probeCentral }}
                env:
                    VERSION: ${{ inputs.version }}
                run: |
                    url="https://repo1.maven.org/maven2/nl/nl-portal/core/${VERSION}/core-${VERSION}.pom"
                    code=$(curl -s -o /dev/null -w '%{http_code}' "${url}")
                    if [ "${code}" = "200" ]; then
                      echo "::notice::nl.nl-portal:core:${VERSION} already on Maven Central - skipping deploy."
                      echo "skip=true" >> "$GITHUB_OUTPUT"
                    else
                      echo "skip=false" >> "$GITHUB_OUTPUT"
                    fi
            -   name: Deploy with JReleaser
                if: ${{ !inputs.probeCentral || steps.probe.outputs.skip != 'true' }}
                uses: jreleaser/release-action@90ac653bb9c79d11179e65d81499f3f34527dcd5 # 2.5.0
                with:
                    arguments: deploy --deployer-name ${{ inputs.deployer }}
                    setup-java: 'false'
                    version: '1.22.0'
                    working-directory: backend
                env:
                    JRELEASER_PROJECT_VERSION: ${{ inputs.version }}
                    JRELEASER_DEPLOY_MAVEN_MAVENCENTRAL_STAGE: 'UPLOAD'
                    JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_SIGNING_PRIVATE_KEY }}
                    JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_SIGNING_PUBLIC_KEY }}
                    JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_SIGNING_PASSPHRASE }}
                    JRELEASER_DEPLOY_MAVEN_MAVENCENTRAL_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
                    JRELEASER_DEPLOY_MAVEN_MAVENCENTRAL_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
                    JRELEASER_DEPLOY_MAVEN_NEXUS2_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
                    JRELEASER_DEPLOY_MAVEN_NEXUS2_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
                    JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            -   name: Download reports + SBOM
                if: ${{ inputs.uploadReports }}
                uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
                with:
                    name: backend-reports
                    path: backend
            -   name: Archive reports + SBOM to S3
                if: ${{ inputs.uploadReports }}
                working-directory: backend
                env:
                    AWS_ACCESS_KEY_ID: ${{ secrets.AWS_BACKEND_ACCESS_KEY_ID }}
                    AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_BACKEND_SECRET_ACCESS_KEY }}
                    AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
                    VERSION: ${{ inputs.version }}
                run: |
                    tar -xf backend-reports.tar
                    aws s3 cp sbom.cyclonedx.json "s3://nl-portal-dependency-reports/sbom/${VERSION}/backend.cdx.json"
                    aws s3 rm "s3://nl-portal-dependency-reports/sbom/latest/backend.cdx.json" || true
                    aws s3 cp sbom.cyclonedx.json "s3://nl-portal-dependency-reports/sbom/latest/backend.cdx.json"
                    if [ -f build/reports/dependency-license/index.html ]; then
                      aws s3 cp build/reports/dependency-license/index.html "s3://nl-portal-licenses/licenses/${VERSION}/index.html"
                    fi
                    if [ -d build/reports/project/dependencies ]; then
                      aws s3 cp --recursive build/reports/project/dependencies "s3://nl-portal-dependency-reports/reports/${VERSION}"
                    fi
