name: _stage-fe

on:
    workflow_call:
        inputs:
            version:
                description: "The channel-decorated version to stamp into every package."
                type: string
                required: true
            runTests:
                description: "Run the test suite. Release sets false (the RC already passed it on this commit)."
                type: boolean
                default: true
            nodeVersion:
                type: string
                default: "24"

permissions:
    contents: read

jobs:
    stage:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            -   name: Set up Node.js ${{ inputs.nodeVersion }}
                uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
                with:
                    node-version: ${{ inputs.nodeVersion }}
            -   name: Install
                working-directory: frontend
                run: npm install -g pnpm@11 && pnpm install
            -   name: Stamp version in place
                working-directory: frontend
                env:
                    VERSION: ${{ inputs.version }}
                run: |
                    sed -i 's/"version": "0.0.0"/"version": "'"${VERSION}"'"/' packages/*/package.json
            -   name: Build
                working-directory: frontend
                run: pnpm -r build
            -   name: Test
                if: ${{ inputs.runTests }}
                working-directory: frontend
                run: pnpm test
            -   name: Package stage bundle
                working-directory: frontend
                run: tar -cf frontend-stage.tar packages/*/dist packages/app/build packages/*/package.json
            -   name: Upload stage bundle
                uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
                with:
                    name: frontend-stage
                    path: frontend/frontend-stage.tar
                    retention-days: 1
