name: _publish-be-s3

on:
    workflow_call:
        inputs:
            version:
                type: string
                required: true

permissions:
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        env:
            BUCKET: ${{ secrets.AWS_MAVEN_SNAPSHOTS_BUCKET }}
        steps:
            -   uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            -   name: Download stage bundle
                uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
                with:
                    name: backend-stage
                    path: backend
            -   name: Restore stage bundle
                working-directory: backend
                run: tar -xf backend-stage.tar && rm backend-stage.tar
            -   name: Sync staging repositories to the Maven snapshot bucket
                working-directory: backend
                env:
                    AWS_ACCESS_KEY_ID: ${{ secrets.AWS_BACKEND_ACCESS_KEY_ID }}
                    AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_BACKEND_SECRET_ACCESS_KEY }}
                    AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
                run: |
                    found=0
                    while IFS= read -r dir; do
                      found=1
                      echo "::notice::Syncing ${dir} -> s3://${BUCKET}/"
                      aws s3 cp --recursive "${dir}/" "s3://${BUCKET}/"
                    done < <(find . -type d -path '*/build/sonatypeCentralStaging')
                    if [ "${found}" -eq 0 ]; then
                      echo "::error::stage bundle contained no sonatypeCentralStaging directories."
                      exit 1
                    fi
            -   name: Log location
                env:
                    VERSION: ${{ inputs.version }}
                run: echo "::notice::Backend ${VERSION} synced to s3://${BUCKET}/"
