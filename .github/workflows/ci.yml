name: CI

on:
    pull_request:
        branches:
            - main
            - "release/*.x"

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    changes:
        runs-on: ubuntu-latest
        outputs:
            backend: ${{ steps.filter.outputs.backend }}
            frontend: ${{ steps.filter.outputs.frontend }}
        steps:
            -   uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            -   uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
                id: filter
                with:
                    filters: |
                        backend:
                            - 'backend/**'
                        frontend:
                            - 'frontend/**'

    validate:
        needs: changes
        uses: ./.github/workflows/_validate-build.yml
        with:
            runBackend: ${{ needs.changes.outputs.backend == 'true' }}
            runFrontend: ${{ needs.changes.outputs.frontend == 'true' }}

    ci-required:
        needs: [changes, validate]
        if: always()
        runs-on: ubuntu-latest
        steps:
            -   name: Aggregate result
                env:
                    VALIDATE_RESULT: ${{ needs.validate.result }}
                run: |
                    echo "::notice::validate result = ${VALIDATE_RESULT}"
                    if [ "${VALIDATE_RESULT}" = "failure" ] || [ "${VALIDATE_RESULT}" = "cancelled" ]; then
                      exit 1
                    fi
