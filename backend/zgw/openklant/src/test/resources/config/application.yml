graphql:
    packages:
        - "nl.nlportal"

nl-portal:
    config:
      openklant2:
          enabled: true
          properties:
              klantinteracties-api-url: http://localhost:9007/klantinteracties/api/v1
              token: ba9d233e95e04c4a8a661a27daffe7c9bd019067
              #digital-adressen-referentie: portaal

logging:
    level:
        reactor.netty.http.client.HttpClient: TRACE

spring:
    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: http://localhost:8082/auth/realms/nlportal

---

spring:
    config:
        activate:
            on-profile: openklant-disabled

nl-portal:
    config:
        openklant2:
            enabled: false

---

spring:
    config:
        activate:
            on-profile: openklant-misconfigured

nl-portal:
    config:
        openklant2:
            enabled: true
            properties:
                klantinteracties-api-url:
                token:
