graphql:
    packages:
        - "nl.nlportal"

logging:
    level:
        reactor.netty.http.client.HttpClient: TRACE

nl-portal:
    config:
        catalogiapi:
            enabled: true
            properties:
                url: http://localhost:8001
                clientId: valtimo_client
                secret: e09b8bc5-5831-4618-ab28-41411304309d
        besluitenapi:
            enabled: true
            properties:
                url: http://localhost:8001
                clientId: valtimo_client
                secret: e09b8bc5-5831-4618-ab28-41411304309d
        documentenapis:
            enabled: true
            properties:
                default-document-api: openzaak
                configurations:
                    openzaak:
                        url: http://localhost:8001
                        clientId: valtimo_client
                        secret: e09b8bc5-5831-4618-ab28-41411304309d
                        rsin: "051845623"
                        documentTypeUrl: http://localhost:8001/catalogi/api/v1/informatieobjecttypen/00000000-0000-0000-000000000000
                    example:
                        url: https://example.org/documenten/api/v1
                        clientId: valtimo_client
                        secret: e09b8bc5-5831-4618-ab28-111111111111
        zakenapi:
            enabled: true
            properties:
                url: http://localhost:8001
                clientId: valtimo_client
                secret: e09b8bc5-5831-4618-ab28-41411304309d
                zaak-types-ids-excluded: c2d3e114-bbe4-478d-80de-e8a8c8f8a948, 4d69cf3c-68b3-43f5-881e-d4984b7649cb

        objectenapi:
            enabled: true
            properties:
                token: 0000000000000000000000000000000000000000
    authentication:
        machtingsdienst:
            resource-url: classpath:machtigingsdiensten.json

spring:
    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: http://localhost:8082/auth/realms/nlportal
