query {
    getOpenProduct(
        id: "694242af-d906-470b-b7e1-eb3527886854"
     ){
        uuid,
        url,
        naam,
        startDatum,
        gepubliceerd,
        aanmaakDatum,
        producttype {
            code,
            uniformeProductNaam,
            toegestaneStatussen,
        }
        prijs,
        gepubliceerd,
        status,
        documenten {
            url
        },
        frequentie,
        verbruiksobject,
        dataobject,
        zaken {
            uuid,
            omschrijving
        },
        taken {
            titel
        },
        acties {
            uuid,
            naam,
            url
        },
        decisions
    }
}
