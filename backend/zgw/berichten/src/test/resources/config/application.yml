graphql:
    packages:
        - "nl.nlportal"

logging:
    level:
        reactor.netty.http.client.HttpClient: TRACE

nl-portal:
    config:
        objectenapi:
            enabled: true
        berichten:
            enabled: true
            properties:
                bericht-object-type-url: "https://example.com/api/v1/objecttypes/78731088-430f-49fd-9a4c-80ddd42ded28"

spring:
    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: http://localhost:8082/auth/realms/nlportal
