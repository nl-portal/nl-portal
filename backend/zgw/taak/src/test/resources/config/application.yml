graphql:
    packages:
        - "nl.nlportal"

logging:
    level:
        reactor.netty.http.client.HttpClient: TRACE

nl-portal:
    config:
        objectenapi:
            enabled: true
            properties:
                url: http://localhost:8010
                token: 0000000000000000000000000000000000000000
        form:
            properties:
                form-definition-object-type-url: "http://localhost:8011/api/v1/objecttypes/form-definition-type"
        taak:
            enabled: true
            properties:
                object-type-url: "http://localhost:8011/api/v1/objecttypes/3c24cab6-4346-4c7d-912b-e34a1e9e21bf"
        documentenapis:
            enabled: true
            properties:
                default-document-api: localhost
                configs:
                    localhost:
                        url: http://localhost:8001
                        token: 0000000000000000000000000000000000000000
                        rsin: "051845623"
                        document-type-url: "http://localhost:8001/api/v1/informatieobjecttypen/1"
    authentication:
        machtingsdienst:
            resource-url: classpath:machtigingsdiensten.json

spring:
    liquibase:
        enabled: true
        change-log: classpath:config/liquibase/form-master.xml
    datasource:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: org.h2.Driver
        url: jdbc:h2:mem:taak-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
        username: sa
        password: ""
        hikari:
            auto-commit: false
    jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        open-in-view: false
        properties:
            hibernate:
                hbm2ddl.auto: none
                connection:
                    provider_disables_autocommit: true
    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: http://localhost:8082/auth/realms/nlportal
