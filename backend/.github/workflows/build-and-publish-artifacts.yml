name: Build and Publish Artifacts
on:
    push:
        branches:
            - "next-minor"
            - "next-major"
            - "rc/*"
            - "release/*"
jobs:
    detect-variables:
        runs-on: ubuntu-latest
        outputs:
            scope: ${{ steps.detect-scope.outputs.SCOPE }}
            version: ${{ steps.detect-scope.outputs.SCOPE == 'SNAPSHOT' && steps.generate-snapshot-version.outputs.VERSION || steps.get-project-version.outputs.PROJECT_VERSION }}
        steps:
            -   name: Detect scope
                id: detect-scope
                run: echo "SCOPE=$(if ${{ github.ref_name == 'next-minor' || github.ref_name == 'next-major' || startsWith(github.ref_name, 'rc/') }} ; then echo "SNAPSHOT" ; elif ${{ startsWith(github.ref_name, 'release/') }} ; then echo "RELEASE" ; else echo "UNKNOWN" ; fi)" >> $GITHUB_OUTPUT
            -   name: Log scope
                run: echo "::notice::Using scope - \"${{ steps.detect-scope.outputs.SCOPE }}\"."
            -   name: Checkout
                uses: actions/checkout@v4
            -   name: Get version from project
                id: get-project-version
                run: echo "PROJECT_VERSION=$(grep "version" gradle.properties | sed 's/^.*=//')" >> $GITHUB_OUTPUT
            -   name: Generate snapshot version
                id: generate-snapshot-version
                if: ${{ steps.detect-scope.outputs.SCOPE == 'SNAPSHOT' }}
                run: |
                    branch=${GITHUB_REF##*/}
                    sha=${GITHUB_SHA::8}
                    ts=$(date +'%Y%m%d%H%M')
                    echo "VERSION=${{ startsWith(github.ref_name, 'rc/') && 'rc' || steps.get-project-version.outputs.PROJECT_VERSION }}-${branch}-${ts}-${sha}-SNAPSHOT" >> "$GITHUB_OUTPUT"
            -   name: Log version
                run: echo "::notice::Using version - \"${{ steps.generate-snapshot-version.outputs.VERSION || steps.get-project-version.outputs.PROJECT_VERSION }}\"."
    validate-build:
        uses: ./.github/workflows/validate-build.yml
        permissions: read-all
    publish-snapshot:
        needs:
            - detect-variables
            - validate-build
        if: ${{ needs.detect-variables.outputs.scope == 'SNAPSHOT' }}
        uses: ./.github/workflows/publish-snapshot.yml
        with:
            targets: "['sonatype-snapshots']"
            artifactVersion: ${{ needs.detect-variables.outputs.version }}
        secrets: inherit
    
    # Disabled for now
    # publish-release:
    #     needs:
    #         - detect-variables
    #         - validate-build
    #     if: ${{ needs.detect-variables.outputs.scope == 'RELEASE' }}
    #     uses: ./.github/workflows/publish-release.yml
    #     with:
    #         artifactVersion: ${{ needs.detect-variables.outputs.version }}
    #     secrets: inherit
    unknown-scope:
        needs:
            - detect-variables
        if: ${{ needs.detect-variables.outputs.scope == 'UNKNOWN' }}
        runs-on: ubuntu-latest
        steps:
            -   name: Fail on invalid scope
                run: echo "::error::Failed to detect scope for this branch. Please make sure this workflow is ran against the correct branches."  && exit 1
