name: Dependency check

on:
    schedule:
        -   cron: "0 8 * * 1"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: dependency-check-${{ github.ref }}
    cancel-in-progress: true

jobs:
    dependency-check:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4
            -   name: Setup Java
                uses: actions/setup-java@v4
                with:
                    distribution: 'temurin'
                    java-version: 21
            -   name: Set up gradle
                uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2
            -   name: Build project
                run: ./gradlew build -x test -x integrationTest -x spotlessCheck
            -   name: Dependency check
                uses: dependency-check/Dependency-Check_Action@1e54355a8b4c8abaa8cc7d0b70aa655a3bb15a6c
                env:
                    JAVA_HOME: /opt/jdk
                with:
                    project: 'NL Portal Backend Libraries'
                    path: '.'
                    format: 'HTML,JSON'
                    out: 'dependency-check'
                    args: >
                        --failOnCVSS 8
                        --enableRetired
                        --suppression cve-exclusions.xml
            -   name: Publish scan information (markdown)
                if: always()
                run: |
                    report_path="${{ github.workspace }}/dependency-check/dependency-check-report.json"
                    if [ ! -f "$report_path" ]; then
                      {
                        echo "## Scan Information"
                        echo
                        echo "Dependency check report JSON was not found."
                      } >> "$GITHUB_STEP_SUMMARY"
                      exit 0
                    fi

                    engine_version="$(jq -r '.scanInfo.engineVersion // "unknown"' "$report_path")"
                    report_generated_on="$(jq -r '.projectInfo.reportDate // "unknown"' "$report_path")"
                    total_dependencies="$(jq '(.dependencies // []) | length' "$report_path")"
                    unique_dependencies="$(jq '(.dependencies // []) | map(.fileName // .packagePath // .filePath // empty) | unique | length' "$report_path")"
                    vulnerable_dependencies="$(jq '[(.dependencies // [])[] | select((.vulnerabilities // []) | length > 0)] | length' "$report_path")"
                    vulnerabilities_found="$(jq '[(.dependencies // [])[] | (.vulnerabilities // [])[]] | length' "$report_path")"

                    {
                      echo "## Scan Information"
                      echo
                      echo "Dependency-check version: ${engine_version}"
                      echo "Report Generated On: ${report_generated_on}"
                      echo "Dependencies Scanned: ${total_dependencies} (${unique_dependencies} unique)"
                      echo "Vulnerable Dependencies: ${vulnerable_dependencies}"
                      echo "Vulnerabilities Found: ${vulnerabilities_found}"
                    } >> "$GITHUB_STEP_SUMMARY"

                    echo "::notice title=Dependency Check Scan Information::Dependency-check version: ${engine_version}; Report Generated On: ${report_generated_on}; Dependencies Scanned: ${total_dependencies} (${unique_dependencies} unique); Vulnerable Dependencies: ${vulnerable_dependencies}; Vulnerabilities Found: ${vulnerabilities_found}"
            -   name: Upload Test results
                if: always()
                uses: actions/upload-artifact@v4
                with:
                    name: Dependency check result
                    path: ${{github.workspace}}/dependency-check
                    retention-days: 7
