graphql:
    packages:
        - "nl.nlportal"

logging:
    level:
        reactor:
            netty:
                http:
                    client: DEBUG
nl-portal:
    authentication:
        machtingsdienst:
            resource-url: classpath:machtigingsdiensten.json
    config:
        catalogiapi:
            enabled: true
            properties:
                url: http://localhost:8001
                clientId: valtimo_client
                secret: e09b8bc5-5831-4618-ab28-41411304309d
        besluitenapi:
            enabled: true
            properties:
                url: http://localhost:8001
                clientId: valtimo_client
                secret: e09b8bc5-5831-4618-ab28-41411304309d
        zakenapi:
            enabled: true
            properties:
                url: http://localhost:8001
                clientId: valtimo_client
                secret: e09b8bc5-5831-4618-ab28-41411304309d
        documentenapis:
            enabled: true
            properties:
                #virusscan:
                #clamav:
                #hostName: localhost
                #enabled: true
                defaultDocumentApi: openzaak
                configurations:
                    openzaak:
                        url: http://localhost:8001/documenten/api/v1
                        clientId: valtimo_client
                        secret: e09b8bc5-5831-4618-ab28-41411304309d
                        rsin: "051845623"
                        documentTypeUrl: http://localhost:8001/catalogi/api/v1/informatieobjecttypen/efc332f2-be3b-4bad-9e3c-49a6219c92ad
                    dummydoc:
                        url: http://localhost:8002/documenten/api/v1
                        clientId: docdoc
                        secret: e09b8bc5-5831-4618-ab28-41411304309d
        objectenapi:
            enabled: true
            properties:
                url: http://localhost:8010
                token: 182c13e2209161852c53cef53a879f7a2f923430
        taak:
            enabled: true
            properties:
                object-type-url: "http://host.docker.internal:8011/api/v1/objecttypes/3e852115-277a-4570-873a-9a64be3aeb34"
        openklant:
            enabled: true
            properties:
                url: http://localhost:8006
                clientId: valtimo_client
                secret: e09b8bc5-5831-4618-ab28-41411304309d
        product:
            enabled: true
            properties:
                product-type-url: http://host.docker.internal:8011/api/v1/objecttypes/3e852115-277a-4570-873a-9a64be3aeb35
                product-instantie-type-url: http://host.docker.internal:8011/api/v1/objecttypes/3e852115-277a-4570-873a-9a64be3aeb34
                product-details-type-url: http://host.docker.internal:8011/api/v1/objecttypes/3e852115-277a-4570-873a-9a64be3aeb36
                product-verbruiks-object-type-url: http://host.docker.internal:8011/api/v1/objecttypes/3e852115-277a-4570-873a-9a64be3aeb37
        dmn:
            enabled: true
            properties:
                url: http://localhost:9000/engine-rest
        prefill:
            enabled: true
            properties:
                type-url: http://host.docker.internal:8011/api/v1/objecttypes/3e852115-277a-4570-873a-9a64be3aeb37

spring:
    liquibase:
        enabled: true
        change-log: classpath:config/liquibase/form-master.xml
    datasource:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: org.h2.Driver
        url: jdbc:h2:mem:product-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
        username: sa
        password: ""
        hikari:
            auto-commit: false
    jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        open-in-view: false
        properties:
            hibernate:
                hbm2ddl.auto: none
                connection:
                    provider_disables_autocommit: true
    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: http://localhost:8082/auth/realms/nlportal
